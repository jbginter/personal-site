version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chatroom-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatroom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - chatroom-network

  # Next.js Development Server with Hot Reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chatroom-app-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chatroom_db?schema=public
      - WATCHPACK_POLLING=true  # Enable polling for file changes in Docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for hot reloading
      - ./app:/app/app
      - ./lib:/app/lib
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./next.config.js:/app/next.config.js
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      # Exclude node_modules and .next from being mounted
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - chatroom-network
    command: npm run dev

  # Prisma Studio (Optional - Database GUI)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: chatroom-prisma-studio
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chatroom_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
      - /app/node_modules
    networks:
      - chatroom-network
    command: npx prisma studio
    profiles:
      - tools  # Only start when using --profile tools

volumes:
  postgres_data_dev:
    driver: local

networks:
  chatroom-network:
    driver: bridge
