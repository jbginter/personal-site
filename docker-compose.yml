version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chatroom-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatroom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Next.js Application
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatroom-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chatroom_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Uncomment below to add environment variables from file
    # env_file:
    #   - .env.local

volumes:
  postgres_data:
    driver: local
